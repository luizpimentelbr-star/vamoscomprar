<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body class="light-theme">
    <header class="app-header">
        <div class="header-main">
            <div class="logo-title">
                <i class="fa-solid fa-cart-shopping logo"></i>
                <h1>Lista de Compras</h1>
            </div>
            <div class="header-actions">
                <button id="themeToggle" title="Alternar Tema"><i class="fa-solid fa-moon"></i></button>
                <button id="sortListBtn" title="Ordenar A-Z"><i class="fa-solid fa-arrow-down-a-z"></i></button>
                <button id="scanBarcodeBtn" title="Leitor de Código de Barras"><i
                        class="fa-solid fa-barcode"></i></button>
                <button id="calendarBtn" title="Abrir Calendário"><i class="fa-regular fa-calendar-days"></i></button>
                <button id="calcBtn" title="Abrir Calculadora"><i class="fa-solid fa-calculator"></i></button>
                <button id="menuBtn" class="hamburger-menu" title="Menu de Opções"><i
                        class="fa-solid fa-bars"></i></button>
            </div>
        </div>
        <div class="header-sub-bar">
            <span>Itens: <span id="headerItemCount">0</span></span>
            <span>Total: <span id="headerTotalValue" class="sub-total">R$ 0,00</span></span>
        </div>
    </header>

    <div class="header-options-dropdown hidden" id="optionsMenu">
        <ul>
            <li><button id="newListBtn"><i class="fa-solid fa-plus"></i> Nova Lista</button></li>
            <li><button id="saveListBtn"><i class="fa-solid fa-floppy-disk"></i> Salvar Lista</button></li>
            <li><button id="savedListsBtn"><i class="fa-solid fa-list"></i> Listas Salvas</button></li>
            <li>
                <button id="importListBtn"><i class="fa-solid fa-file-import"></i> Importar Lista</button>
                <input type="file" id="importXmlInput" accept=".xml" style="display: none;">
            </li>
        </ul>
    </div>

    <!-- Removed sidebar since it's going to be a dropdown directly below the menuBtn -->

    <main class="container">
        <!-- Persistent Inputs -->
        <section class="card persistent-inputs glass">
            <div class="input-group">
                <label for="storeName">Nome do Empreendimento <span class="required">*</span></label>
                <input type="text" id="storeName" placeholder="Ex: Supermercado XYZ" required>
            </div>
            <div class="input-group">
                <label for="purchaseDate">Data da Compra <span class="required">*</span></label>
                <input type="date" id="purchaseDate" required>
            </div>
        </section>

        <!-- Product Inputs -->
        <section class="card product-inputs glass">
            <h2>Adicionar Produto</h2>
            <div class="form-grid">
                <div class="input-group full-width">
                    <label for="productName">Nome do Produto <span class="required">*</span></label>
                    <input type="text" id="productName" placeholder="Digite o nome do produto" required>
                </div>
                <div class="input-group">
                    <label for="quantity">Quantidade <span class="required">*</span></label>
                    <input type="number" id="quantity" step="0.01" min="0" placeholder="0.00" required>
                </div>
                <div class="input-group">
                    <label for="unit">Unidade <span class="required">*</span></label>
                    <select id="unit">
                        <option value="un">Unidade (un)</option>
                        <option value="kg">Quilograma (kg)</option>
                        <option value="g">Grama (g)</option>
                        <option value="l">Litro (l)</option>
                        <option value="ml">Mililitro (ml)</option>
                        <option value="m">Metro (m)</option>
                        <option value="m2">Metro Quadrado (m²)</option>
                        <option value="cx">Caixa (cx)</option>
                        <option value="pct">Pacote (pct)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="unitPrice">Valor Unitário (R$)</label>
                    <input type="number" id="unitPrice" step="0.01" min="0" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label for="totalPrice">Valor Total (R$)</label>
                    <input type="text" id="totalPrice" readonly placeholder="0.00">
                </div>
            </div>
            <div class="actions">
                <button id="addItemBtn" class="btn-primary">Gravar Item</button>
            </div>
            <div id="feedbackMessage" class="feedback-msg hidden"></div>
        </section>

        <!-- List Container -->
        <section class="card list-section glass">
            <h2>Itens da Lista</h2>
            <div class="list-container" id="listContainer">
                <div class="empty-state">Nenhum item adicionado ainda.</div>
            </div>
        </section>

        <!-- Summaries -->
        <section class="summary-section">
            <div class="summary-card waiting glass">
                <h3>Aguardando</h3>
                <div class="summary-details">
                    <span class="summary-label">Itens:</span> <span id="waitingCount">0</span><br>
                    <span class="summary-label">Total:</span> <span id="waitingTotal">R$ 0,00</span>
                </div>
            </div>
            <div class="summary-card bought glass">
                <h3>Comprados</h3>
                <div class="summary-details">
                    <span class="summary-label">Itens:</span> <span id="boughtCount">0</span><br>
                    <span class="summary-label">Total:</span> <span id="boughtTotal">R$ 0,00</span>
                </div>
            </div>
            <div class="summary-card general glass">
                <h3>Total Geral</h3>
                <div class="summary-details">
                    <span class="summary-label">Itens:</span> <span id="generalCount">0</span><br>
                    <span class="summary-label">Valor:</span> <span id="generalTotal">R$ 0,00</span>
                </div>
            </div>
        </section>
    </main>

    <!-- Modals -->
    <div id="savedListsModal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Listas Salvas</h2>
                <button id="closeSavedListsBtn" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="savedListsContainer">
            </div>
        </div>
    </div>

    <div id="exportModal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Exportar/Compartilhar</h2>
                <button id="closeExportBtn" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <button class="btn-secondary" id="exportTxtBtn"><i class="fa-solid fa-file-lines"></i> Texto
                    (.txt)</button>
                <button class="btn-secondary" id="exportXmlBtn"><i class="fa-solid fa-file-code"></i> XML
                    (.xml)</button>
                <button class="btn-secondary" id="exportPdfBtn"><i class="fa-solid fa-file-pdf"></i> PDF (.pdf)</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
